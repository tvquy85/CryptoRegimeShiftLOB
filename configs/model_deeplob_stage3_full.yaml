inherits: configs/models_stage3_temporal_gpu.yaml
model_name: deeplob
temporal:
  prediction_source: data/splits/splits_btc_stage3_purged.parquet
  model_name: deeplob
  model_labels:
    deeplob: deeplob_cnn_lstm_stage3_full
  prediction_outputs:
    deeplob: data/predictions/predictions_stage3_deeplob_full_stride10_forecasting.parquet
  audit_output: audits/audit_deeplob_full_row_train_baseline.md
  evaluation_scope: stage3_deeplob_full_train_stride10_valid_test
  levels: 10
  window: 100
  normalize_features: true
  scaler_max_rows:
  source_batch_rows: 250000
  hidden_dim: 64
  deeplob_conv_channels: 16
  deeplob_inception_channels: 32
  train_batch_windows: 1024
  eval_batch_windows: 2048
  learning_rate: 0.001
  weight_decay: 0.0001
  epochs: 3
  early_stopping_patience: 1
  mixed_precision: true
  strides:
    train: 5
    valid: 10
    test: 10
  max_windows:
    train:
    valid:
    test:
  prediction_train_windows: 0
