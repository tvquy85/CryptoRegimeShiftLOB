project_root: .
artifact_namespace: synthetic_smoke
raw_data_root: sample_data
exchange: BINANCE
symbols:
  - SYNTH-USDT
file_glob: BOOK_{exchange}_{symbol}_*-2024.parquet
timestamp_preference:
  - origin_time
  - received_time
levels: 20

partitioned_stage_feature_build: false
reuse_partitioned_feature_parts: false
stage_ranges:
  stage_0_sanity_check:
    start: "2024-01-01T00:00:00Z"
    end: "2024-01-01T00:19:59.900Z"

feature_output: data/features/features_synthetic_smoke.parquet
labels_output: data/labels/labels_synthetic_smoke.parquet
regime_output: data/regimes/regimes_synthetic_smoke.parquet
thresholds_output: data/regimes/regime_thresholds_synthetic_smoke.json
split_output: data/splits/splits_synthetic_smoke.parquet
prediction_output: data/predictions/predictions_synthetic_smoke.parquet
reports_output: data/reports/synthetic_smoke
tables_output: outputs/tables
figures_output: outputs/smoke/figures
paper_assets_output: outputs/smoke/paper_assets

eps: 1.0e-9
depth_levels:
  - 1
  - 3
  - 5
  - 10
  - 20
event_horizons:
  - 10
  - 50
  - 100
event_windows:
  - 20
  - 100
  - 500
time_windows_seconds:
  - 60
label_horizon_events: 50
fee_bps: 1.0
slippage_buffer_multiplier: 0.5
compact_storage: true
include_tensor_columns: false

train_fraction_for_thresholds: 0.6
quantiles:
  low: 0.4
  mid: 0.5
  high: 0.7
  very_high: 0.8
  very_low: 0.1
hybrid_taxonomy:
  confidence_margin: 0.05
  unknown_target_share: 0.15
  daily_unknown_p90_target: 0.25
  diagnostic_sample_size: 12000
  random_seed: 7
  cluster_components:
    - 2
    - 3

split:
  strategy: chronological
  train_fraction: 0.6
  valid_fraction: 0.2
  purge_horizon_events: true
  purge_gap_events: 50

model_name: sgd
model_label: sgd_synthetic_smoke
model_dir: outputs/checkpoints
random_seed: 7
rsep_grid_config: configs/rsep_grid.yaml
tabular_features:
  - rel_spread
  - microprice_deviation
  - depth_imbalance_1
  - depth_imbalance_5
  - depth_imbalance_10
  - ofi_1
  - ofi_5
  - realized_vol_20
  - realized_vol_100
  - spread_z_1m
  - depth_z_1m
  - liquidity_drought_score
  - adverse_selection_score
  - momentum_score
  - choppiness_score
train_valid_test:
  train: train
  valid: valid
  test: test
sgd:
  alpha: 0.0001
  max_iter: 1000
  tol: 0.001

policy_tuning_sample_rows: 50000
simulator:
  latency_events: 1
  fee_bps: 1.0
  spread_multiplier: 1.0
  depth_multiplier: 1.0
  partial_fill: true
  min_fill_ratio: 0.5
  trade_notional: 1000.0
  cooldown_events: 3
policies:
  naive_threshold: 0.55
  cost_aware_edge_threshold: 0.0
  rsep:
    theta_edge: 0.0
    lambda_latency: 0.25
    lambda_liquidity: 0.25
    lambda_adverse: 0.25
    lambda_regime: 0.15
    max_turnover: 1.0
    include_no_cost_gate: false
stress_grid:
  fee_bps:
    - 0.0
    - 1.0
    - 5.0
  latency_events:
    - 0
    - 1
    - 5
  spread_multiplier:
    - 1.0
    - 2.0
  depth_multiplier:
    - 1.0
    - 0.5
