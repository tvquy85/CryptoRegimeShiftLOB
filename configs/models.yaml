inherits: configs/experiments_smoke.yaml
prediction_output: data/predictions/predictions.parquet
model_dir: outputs/checkpoints
model_name: sgd
random_seed: 7
tabular_features:
  - rel_spread
  - microprice_deviation
  - depth_imbalance_1
  - depth_imbalance_5
  - depth_imbalance_10
  - ofi_1
  - ofi_5
  - realized_vol_20
  - realized_vol_100
  - spread_z_1m
  - depth_z_1m
  - liquidity_drought_score
  - adverse_selection_score
  - momentum_score
  - choppiness_score
train_valid_test:
  train: train
  valid: valid
  test: test
sgd:
  alpha: 0.0001
  max_iter: 2000
  tol: 0.001
xgboost:
  use_gpu: true
  tree_method: hist
  max_depth: 5
  n_estimators: 150
  learning_rate: 0.05
  subsample: 0.9
  colsample_bytree: 0.9
